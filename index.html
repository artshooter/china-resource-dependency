<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国关键资源对外依存度分析</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-card-hover: #222230;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #555566;
            --accent-red: #ff4757;
            --accent-orange: #ffa502;
            --accent-yellow: #ffd43b;
            --accent-green: #2ed573;
            --accent-blue: #70a1ff;
            --accent-purple: #a55eea;
            --border: #2a2a3a;
            --gradient-danger: linear-gradient(135deg, #ff4757, #ff6b81);
            --gradient-warning: linear-gradient(135deg, #ffa502, #ffb142);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 71, 87, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(112, 161, 255, 0.08) 0%, transparent 50%);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        header {
            padding: 40px 0 32px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 32px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 24px;
        }

        .title-section h1 {
            font-size: clamp(28px, 4vw, 42px);
            font-weight: 900;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title-section p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .update-info {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
            text-align: right;
        }

        /* Country Map Section */
        .country-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--accent-orange);
            border-radius: 2px;
        }

        .country-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }

        .country-card {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .country-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-danger);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .country-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-orange);
            transform: translateY(-4px);
        }

        .country-card:hover::before {
            transform: scaleX(1);
        }

        .country-card.active {
            border-color: var(--accent-red);
            background: rgba(255, 71, 87, 0.1);
        }

        .country-card.active::before {
            transform: scaleX(1);
        }

        .country-flag {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .country-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .country-resources {
            font-size: 11px;
            color: var(--text-muted);
        }

        .country-risk {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
        }

        .country-risk.critical {
            background: rgba(255, 71, 87, 0.2);
            color: var(--accent-red);
        }

        .country-risk.high {
            background: rgba(255, 165, 2, 0.2);
            color: var(--accent-orange);
        }

        /* Detail Panel */
        .detail-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 40px;
            display: none;
        }

        .detail-panel.show {
            display: block;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .detail-flag {
            font-size: 48px;
        }

        .detail-title h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .detail-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .close-btn {
            margin-left: auto;
            width: 36px;
            height: 36px;
            border: none;
            background: var(--bg-secondary);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            background: var(--accent-red);
            color: white;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }
        }

        .detail-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
        }

        .detail-section h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--accent-orange);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .resource-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: var(--bg-card);
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 3px solid var(--accent-red);
        }

        .resource-item:last-child {
            margin-bottom: 0;
        }

        .resource-icon {
            width: 36px;
            height: 36px;
            background: var(--bg-secondary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-right: 12px;
        }

        .resource-info {
            flex: 1;
        }

        .resource-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .resource-dependency {
            font-size: 11px;
            color: var(--text-muted);
        }

        .resource-percent {
            font-family: 'Space Mono', monospace;
            font-size: 16px;
            font-weight: 700;
            color: var(--accent-red);
        }

        .impact-item {
            padding: 12px;
            background: var(--bg-card);
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 3px solid var(--accent-orange);
        }

        .impact-item:last-child {
            margin-bottom: 0;
        }

        .impact-title {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .impact-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .company-item {
            padding: 12px;
            background: var(--bg-card);
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .company-item:last-child {
            margin-bottom: 0;
        }

        .company-name {
            font-size: 14px;
            font-weight: 500;
        }

        .company-code {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--accent-blue);
            background: rgba(112, 161, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .company-note {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Full data table */
        .full-table-section {
            margin-bottom: 40px;
        }

        .data-table-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            background: var(--bg-secondary);
            padding: 14px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }

        .data-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table tr:hover {
            background: rgba(255, 165, 2, 0.05);
        }

        .source-tag {
            display: inline-block;
            padding: 3px 8px;
            background: var(--bg-secondary);
            border-radius: 12px;
            font-size: 11px;
            color: var(--text-secondary);
            margin-right: 4px;
            margin-bottom: 2px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .source-tag:hover {
            background: var(--accent-orange);
            color: var(--bg-primary);
        }

        .source-tag.primary {
            background: rgba(255, 71, 87, 0.15);
            color: var(--accent-red);
        }

        .source-tag.primary:hover {
            background: var(--accent-red);
            color: white;
        }

        .dependency-badge {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
        }

        .dependency-badge.critical {
            background: rgba(255, 71, 87, 0.15);
            color: var(--accent-red);
        }

        .dependency-badge.warning {
            background: rgba(255, 165, 2, 0.15);
            color: var(--accent-orange);
        }

        .dependency-badge.moderate {
            background: rgba(255, 212, 59, 0.15);
            color: var(--accent-yellow);
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--border);
            padding: 24px 0;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }

        /* Responsive */
        @media (max-width: 768px) {
            .country-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .detail-header {
                flex-wrap: wrap;
            }

            .close-btn {
                margin-left: 0;
                margin-top: 12px;
            }
        }
    </style>
</head>

                    </thead>
                    <tbody id="dataTableBody">
                        <!-- 动态生成 -->

                </table>
            </div>

        <footer>

                <div>2025 | 点击国家卡片查看详情</div>
            </div>
        </footer>
    </div>

                        { icon: '🛢️', name: '原油', percent: '15%+', dependency: '占中国进口总量' },
                        { icon: '🔥', name: '天然气', percent: '10%+', dependency: '管道进口' },
                        { icon: '🧪', name: '钾盐', percent: '30%+', dependency: '占中国进口总量' }
                    ],
                    impacts: [
                        { title: '能源多元化', desc: '俄罗斯是能源进口多元化重要来源' },
                        { title: '制裁风险', desc: '西方制裁可能影响结算和运输' },
                        { title: '化肥供应', desc: '钾肥断供影响农业生产' }
                    ],
                    companies: [
                        { name: '中国石油', code: '601857', note: '中俄能源合作' },
                        { name: '中国石化', code: '600028', note: '炼化一体化' },
                        { name: '盐湖股份', code: '000792', note: '国内钾肥龙头' },
                        { name: '藏格矿业', code: '000408', note: '钾肥产能' }
                    ]
                }
            },
            southafrica: {
                name: '南非',
                flag: '🇿🇦',
                risk: 'high',
                resources: '铂族金属、锰矿',
                details: {
                    resources: [
                        { icon: '💎', name: '铂族金属', percent: '60%+', dependency: '占中国进口总量' },
                        { icon: '🔩', name: '锰矿', percent: '40%+', dependency: '占中国进口总量' }
                    ],
                    impacts: [
                        { title: '汽车催化剂', desc: '铂钯是汽车尾气催化剂核心' },
                        { title: '电子产业', desc: '铂族金属用于电子元器件' },
                        { title: '供应集中', desc: '南非铂矿占全球70%+' }
                    ],
                    companies: [
                        { name: '贵研铂业', code: '600459', note: '铂族金属加工' },
                        { name: '株冶集团', code: '600961', note: '贵金属综合回收' }
                    ]
                }
            },
            philippines: {
                name: '菲律宾',
                flag: '🇵🇭',
                risk: 'high',
                resources: '镍矿、铜矿',
                details: {
                    resources: [
                        { icon: '🧲', name: '镍矿', percent: '30%+', dependency: '占中国进口总量' },
                        { icon: '🥉', name: '铜矿', percent: '10%+', dependency: '占中国进口总量' }
                    ],
                    impacts: [
                        { title: '镍矿补充来源', desc: '作为印尼禁矿后的重要补充' },
                        { title: '品位较低', desc: '菲律宾镍矿品位低于印尼' },
                        { title: '政策风险', desc: '环保政策趋严，出口受限' }
                    ],
                    companies: [
                        { name: '中色股份', code: '000758', note: '菲律宾镍矿项目' }
                    ]
                }
            }
        };

        // 资源数据
        const resourceData = [
            { name: '铌矿', icon: '🔩', dependency: '99%', level: 'critical', sources: [{ country: 'brazil', percent: '85%+', primary: true }], usage: '钢铁添加剂、航空航天' },
            { name: '钴矿', icon: '🔋', dependency: '98%', level: 'critical', sources: [{ country: 'congo', percent: '98.5%', primary: true }], usage: '电池、磁性材料' },
            { name: '钽矿', icon: '⚡', dependency: '93%', level: 'critical', sources: [{ country: 'africa', percent: '多国', primary: false }], usage: '电子元件、电容器' },
            { name: '镍矿', icon: '🧲', dependency: '83-90%', level: 'critical', sources: [{ country: 'indonesia', percent: '60%+', primary: true }, { country: 'philippines', percent: '30%+', primary: false }], usage: '不锈钢、电池' },
            { name: '铂族金属', icon: '💎', dependency: '80%+', level: 'critical', sources: [{ country: 'southafrica', percent: '60%+', primary: true }, { country: 'russia', percent: '20%+', primary: false }], usage: '催化剂、电子、医疗' },
            { name: '铁矿石', icon: '🏔️', dependency: '80%+', level: 'warning', sources: [{ country: 'australia', percent: '60%', primary: true }, { country: 'brazil', percent: '20%', primary: false }], usage: '钢铁冶炼' },
            { name: '原油', icon: '🛢️', dependency: '72%', level: 'warning', sources: [{ country: 'russia', percent: '15%+', primary: false }, { country: 'iran', percent: '9%', primary: false }], usage: '能源、化工' },
            { name: '锂矿', icon: '⚡', dependency: '55-60%', level: 'warning', sources: [{ country: 'australia', percent: '50%+', primary: true }], usage: '锂电池' },
            { name: '锶矿', icon: '🔮', dependency: '50%', level: 'warning', sources: [{ country: 'iran', percent: '60-70%', primary: true }], usage: '玻璃基板、磁性材料' },
            { name: '钾盐', icon: '🧪', dependency: '50-55%', level: 'moderate', sources: [{ country: 'russia', percent: '30%+', primary: true }], usage: '农业化肥' }
        ];

        // 初始化国家卡片
        function initCountryGrid() {
            const grid = document.getElementById('countryGrid');
            grid.innerHTML = '';
            
            Object.entries(countryData).forEach(([key, data]) => {
                const card = document.createElement('div');
                card.className = 'country-card';
                card.dataset.country = key;
                card.innerHTML = `
                    <span class="country-risk ${data.risk}">${data.risk === 'critical' ? '极高风险' : '高风险'}</span>
                    <div class="country-flag">${data.flag}</div>
                    <div class="country-name">${data.name}</div>
                    <div class="country-resources">${data.resources}</div>
                `;
                card.addEventListener('click', () => showDetail(key));
                grid.appendChild(card);
            });
        }

        // 显示详情
        function showDetail(countryKey) {
            const data = countryData[countryKey];
            if (!data) return;

            // 更新active状态
            document.querySelectorAll('.country-card').forEach(card => {
                card.classList.remove('active');
                if (card.dataset.country === countryKey) {
                    card.classList.add('active');
                }
            });

            // 更新详情面板
            document.getElementById('detailFlag').textContent = data.flag;
            document.getElementById('detailCountry').textContent = data.name;
            document.getElementById('detailSubtitle').textContent = `中国对${data.name}资源依赖分析`;

            // 资源列表
            const resourceList = document.getElementById('resourceList');
            resourceList.innerHTML = data.details.resources.map(r => `
                <div class="resource-item">
                    <div class="resource-icon">${r.icon}</div>
                    <div class="resource-info">
                        <div class="resource-name">${r.name}</div>
                        <div class="resource-dependency">${r.dependency}</div>
                    </div>
                    <div class="resource-percent">${r.percent}</div>
                </div>
            `).join('');

            // 影响列表
            const impactList = document.getElementById('impactList');
            impactList.innerHTML = data.details.impacts.map(i => `
                <div class="impact-item">
                    <div class="impact-title">${i.title}</div>
                    <div class="impact-desc">${i.desc}</div>
                </div>
            `).join('');

            // 企业列表
            const companyList = document.getElementById('companyList');
            companyList.innerHTML = data.details.companies.map(c => `
                <div class="company-item">
                    <div>
                        <div class="company-name">${c.name}</div>
                        <div class="company-note">${c.note}</div>
                    </div>
                    ${c.code !== '未上市' ? `<span class="company-code">${c.code}</span>` : '<span class="company-code" style="background:#333;color:#666;">未上市</span>'}
                </div>
            `).join('');

            // 显示面板
            const panel = document.getElementById('detailPanel');
            panel.classList.add('show');
            panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // 关闭详情
        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('show');
            document.querySelectorAll('.country-card').forEach(card => {
                card.classList.remove('active');
            });
        }

        // 初始化数据表格
        function initDataTable() {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = resourceData.map(r => `
                <tr>
                    <td>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <span style="font-size:18px;">${r.icon}</span>
                            <span style="font-weight:500;">${r.name}</span>
                        </div>
                    </td>
                    <td>
                        <span class="dependency-badge ${r.level}">${r.dependency}</span>
                    </td>
                    <td>
                        ${r.sources.map(s => {
                            const country = countryData[s.country];
                            const name = country ? country.name : '多国';
                            return `<span class="source-tag ${s.primary ? 'primary' : ''}" onclick="${country ? `showDetail('${s.country}')` : ''}">${name} ${s.percent}</span>`;
                        }).join('')}
                    </td>
                    <td>${r.usage}</td>
                </tr>
            `).join('');
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initCountryGrid();
            initDataTable();
        });
    </script>
</body>
</html>
